        "name": "Hakboni",

        "publishingPrinciples": "Only Korean and Taiwan professional news sources are linked; wiki, social-only, and unsourced fan pages are excluded."

  <body>
    <header class="site-header">
      <div class="utility-bar">
          <span id="today-date" aria-live="polite"></span>
          <span>最新新聞 / 최신 뉴스</span>
      </div>
      <nav class="main-nav" aria-label="Primary navigation">
        <a class="brand" href="./index.html" aria-label="Hakboni home">
          <span class="brand-mark">H</span>
          <span class="brand-text">Hakboni</span>
        </a>
        <button class="menu-button" type="button" aria-expanded="false" aria-controls="nav-links">
          <span></span>

          <span></span>

        <div class="nav-links" id="nav-links">
          <a href="#latest-heading">最新</a>
          <a href="#top-coverage">KBO</a>

        </div>
      </nav>

    <main>
      <section class="breaking-strip" aria-label="快訊與最新更新">
        <div class="breaking-label">快訊</div>
        <div class="ticker" id="ticker">
          <span>最新可驗證新聞置頂；所有舊報導保留於歷史精選</span>
        </div>
      </section>

      <section class="top-grid" aria-label="Top stories">
        <article class="lead-story">
          <a class="lead-media" id="lead-media" href="#" target="_blank" rel="noopener noreferrer">
            <img src="assets/lead-stadium-cheer.png" alt="Cheer squad performing at a baseball stadium">
          </a>
          <div class="lead-copy">
            <div class="story-meta">
              <span class="section-label" id="lead-section">頭條</span>
              <a id="lead-source" href="#" target="_blank" rel="noopener noreferrer">來源</a>
            </div>
            <h1>
              <a id="lead-title" href="#" target="_blank" rel="noopener noreferrer">載入最新頭條</a>
            </h1>
            <p id="lead-summary"></p>
          </div>
        </article>

        <aside class="latest-panel" aria-labelledby="latest-heading">
          <div class="panel-heading">
            <h2 id="latest-heading">最新</h2>
            <span>原文來源</span>
          </div>
          <div class="latest-list" id="latest-list"></div>
        </aside>
      </section>

      <section class="news-section" id="top-coverage" aria-labelledby="news-heading">
        <div class="section-heading">
          <h2 id="news-heading">重點報導</h2>
          <p>最新可驗證韓國與台灣新聞來源優先呈現；舊報導不刪除，會保存到歷史精選供讀者搜尋。</p>
        </div>
        <div class="story-grid" id="story-grid"></div>
      </section>

      <section class="history-section" id="history" aria-labelledby="history-heading">
        <div class="section-heading history-heading">
          <div>
            <h2 id="history-heading">歷史精選</h2>
            <p>所有已核實新聞都會保留在這裡，不刪除舊報導；可用人名、球隊、來源或主題搜尋。</p>
          </div>
          <label class="archive-search">
            <span>搜尋歷史新聞</span>
            <input
              id="archive-search"
              type="search"
              autocomplete="off"
              placeholder="搜尋：李珠珢、富邦、KBO、NOWnews..."
            >
          </label>
        </div>
        <div class="archive-count" id="archive-count"></div>
        <div class="archive-list" id="archive-list"></div>
      </section>

      <section class="source-policy" aria-label="Source policy">
        <strong>來源規則</strong>
        <span>只使用韓國與台灣專業新聞網站；不使用Wikipedia、Wikimedia、wiki鏡像、純社群貼文或未具名粉絲頁。</span>
      </section>
    </main>

    <footer class="site-footer">
      <p>Hakboni 僅連結已核准的韓國與台灣新聞來源。</p>
